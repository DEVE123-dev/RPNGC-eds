<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Command - RPNGC Emergency Dispatch</title>
    <link rel="stylesheet" href="/css/rpngc.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <img src="/images/logo.jpg" alt="RPNGC Logo" class="login-logo">
            <h2>HQ Command Login</h2>
            <p>Royal Papua New Guinea Constabulary</p>
            <hr class="login-divider">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username-input" placeholder="hq-admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password-input" placeholder="Enter password">
            </div>
            <button class="btn btn-blue" id="login-btn">Login</button>
            <div id="login-error" class="error-msg"></div>
        </div>
    </div>

    <header class="rpngc-header" style="display: none;" id="main-header">
        <img src="/images/logo.jpg" alt="RPNGC Logo">
        <div>
            <h1>Royal Papua New Guinea Constabulary</h1>
            <p>HQ Command Center</p>
        </div>
        <a href="/admin.html" style="margin-left: 0;">Manage Officers</a>
        <a href="/" id="logout-btn">Logout</a>
    </header>

    <div class="rpngc-layout" style="display: none;" id="main-layout">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
        <aside class="rpngc-sidebar" id="sidebar">
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stat-waiting">0</div>
                    <div class="stat-label">Waiting</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-engaged">0</div>
                    <div class="stat-label">Engaged</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-resolved">0</div>
                    <div class="stat-label">Resolved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>

            <div style="display: flex; border-bottom: 1px solid #dde3f0;">
                <button class="tab-btn active" data-tab="incidents">Incidents</button>
                <button class="tab-btn" data-tab="officers">Officers</button>
                <button class="tab-btn" data-tab="analytics">Analytics</button>
            </div>

            <div class="rpngc-sidebar-section tab-content" id="tab-incidents">
                <h3>Active Incidents</h3>
                <div id="incident-list"></div>
            </div>

            <div class="rpngc-sidebar-section tab-content" id="tab-officers" style="display: none;">
                <h3>Officer Status</h3>
                <div id="officer-list"></div>
            </div>

            <div class="rpngc-sidebar-section tab-content" id="tab-analytics" style="display: none;">
                <h3>Analytics</h3>
                <div class="profile-card" style="margin-bottom: 12px;">
                    <strong>Avg Response Time:</strong> <span id="avg-response">-</span> minutes
                </div>
                <h3 style="margin-top: 16px; font-size: 0.68rem;">Incidents by Type</h3>
                <div id="chart-by-type" style="margin-top: 8px;"></div>
                <h3 style="margin-top: 16px; font-size: 0.68rem;">Incidents by Urgency</h3>
                <div id="chart-by-urgency" style="margin-top: 8px;"></div>
            </div>
        </aside>

        <div id="map"></div>
    </div>

    <style>
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #fff;
            color: var(--rpngc-blue);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .tab-btn:hover { background: #f4f7ff; }
        .tab-btn.active {
            background: var(--rpngc-blue);
            color: #fff;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .chart-label {
            width: 80px;
            font-weight: 600;
            color: var(--rpngc-blue-dark);
        }
        .chart-fill {
            height: 20px;
            background: var(--rpngc-blue);
            border-radius: 3px;
            margin-right: 6px;
        }
        .chart-value {
            color: #666;
            font-size: 0.75rem;
        }
        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
        }
        .edit-btn {
            background: var(--rpngc-blue);
            color: #fff;
        }
        .edit-btn:hover {
            opacity: 0.88;
        }
    </style>

    <script>
        const socket = io();
        let map;
        let token = null;
        let incidentMarkers = {};
        let officerMarkers = {};

        // Login
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value;
            
            try {
                const res = await fetch('/auth/hq/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);
                
                token = data.token;
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('main-layout').style.display = 'flex';
                
                initializeHQ();
            } catch (err) {
                document.getElementById('login-error').textContent = err.message;
            }
        });

        document.getElementById('password-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });

        async function initializeHQ() {
            // Initialize map
            map = L.map('map').setView([-9.4438, 147.1803], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            socket.emit('join', { userId: 'hq', role: 'hq' });

            // Load data
            loadStats();
            loadIncidents();
            loadOfficers();
            loadAnalytics();

            // Socket events
            socket.on('incident-update', data => {
                loadStats();
                loadIncidents();
            });

            socket.on('officer-location', data => {
                updateOfficerMarker(data);
            });

            socket.on('officer-status-update', data => {
                loadOfficers();
            });

            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
                });
            });
        }

        async function loadStats() {
            const res = await fetch('/incidents/stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('stat-waiting').textContent = data.waiting;
            document.getElementById('stat-engaged').textContent = data.engaged;
            document.getElementById('stat-resolved').textContent = data.resolved;
            document.getElementById('stat-total').textContent = data.total;
            document.getElementById('avg-response').textContent = data.avgResponseMinutes || '-';
        }

        async function loadIncidents() {
            const res = await fetch('/incidents', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            // Clear old markers
            Object.values(incidentMarkers).forEach(m => map.removeLayer(m));
            incidentMarkers = {};

            const list = document.getElementById('incident-list');
            if (data.features.length === 0) {
                list.innerHTML = '<div class="notification info">No active incidents</div>';
                return;
            }

            list.innerHTML = '<ul class="incident-list">' + data.features.map(f => {
                const p = f.properties;
                const marker = L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #C8102E; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    })
                }).addTo(map).bindPopup(`
                    <strong>${p.incidentType}</strong><br>
                    Status: ${p.status}<br>
                    Urgency: ${p.urgency}<br>
                    ${p.isSOS ? '<strong style="color: red;">[SOS]</strong>' : ''}
                `);
                incidentMarkers[p.id] = marker;

                return `
                    <li class="incident-item">
                        <div class="inc-type">
                            ${p.isSOS ? '[SOS] ' : ''}${p.incidentType}
                            <span class="badge-urgency urgency-${p.urgency}">${p.urgency}</span>
                        </div>
                        <div class="inc-addr">${p.address || 'Unknown location'}</div>
                        <div class="inc-meta">Status: ${p.status} | Phone: ${p.citizenPhone || 'N/A'}</div>
                    </li>
                `;
            }).join('') + '</ul>';
        }

        async function loadOfficers() {
            const res = await fetch('/officers/all', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            const list = document.getElementById('officer-list');
            list.innerHTML = '<ul class="incident-list">' + data.officers.map(o => `
                <li class="incident-item">
                    <div class="inc-type">${o.displayName}</div>
                    <div class="inc-addr">${o.badgeNumber} | ${o.rank}</div>
                    <div class="inc-meta">
                        Station: ${o.station} | 
                        Status: <span style="color: ${o.status === 'available' ? 'green' : o.status === 'busy' ? 'red' : '#999'}">${o.status || 'offline'}</span>
                        ${o.status === 'busy' ? `<button class="action-btn edit-btn" onclick="freeOfficer('${o.userId}')" style="margin-left: 8px; padding: 3px 8px; font-size: 0.7rem;">Set Available</button>` : ''}
                    </div>
                </li>
            `).join('') + '</ul>';
        }

        async function freeOfficer(userId) {
            if (!confirm('Set this officer to available?')) return;
            
            try {
                await fetch(`/admin/officers/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'available' })
                });
                loadOfficers();
            } catch (err) {
                alert('Failed to update officer status');
            }
        }

        window.freeOfficer = freeOfficer;

        async function loadAnalytics() {
            const res = await fetch('/incidents/report', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            renderChart('chart-by-type', data.byType);
            renderChart('chart-by-urgency', data.byUrgency);
        }

        function renderChart(containerId, data) {
            const container = document.getElementById(containerId);
            const max = Math.max(...Object.values(data), 1);
            
            container.innerHTML = Object.entries(data).map(([key, val]) => `
                <div class="chart-bar">
                    <div class="chart-label">${key}</div>
                    <div class="chart-fill" style="width: ${(val / max) * 150}px;"></div>
                    <div class="chart-value">${val}</div>
                </div>
            `).join('');
        }

        function updateOfficerMarker(data) {
            if (officerMarkers[data.officerId]) {
                officerMarkers[data.officerId].setLatLng([data.latitude, data.longitude]);
            } else {
                officerMarkers[data.officerId] = L.marker([data.latitude, data.longitude], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #0057B8; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    })
                }).addTo(map).bindPopup(data.displayName);
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('Logout?')) location.href = '/';
        });

        // Mobile menu toggle
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Close sidebar when clicking on map (mobile)
        document.getElementById('map').addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
