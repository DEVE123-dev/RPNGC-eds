<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Portal - RPNGC Emergency Dispatch</title>
    <link rel="stylesheet" href="/css/rpngc.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="rpngc-header">
        <img src="/images/logo.jpg" alt="RPNGC Logo">
        <div>
            <h1>Royal Papua New Guinea Constabulary</h1>
            <p>Citizen Emergency Portal</p>
        </div>
        <a href="/">← Back to Home</a>
    </header>

    <div class="rpngc-layout">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
        <aside class="rpngc-sidebar" id="sidebar">
            <div class="rpngc-sidebar-section">
                <h3>Request Assistance</h3>
                <div id="request-form">
                    <div class="form-group">
                        <label>Your Phone Number</label>
                        <input type="tel" id="phone-input" placeholder="+675 XXXX XXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Incident Type</label>
                        <select id="incident-type">
                            <option value="theft">Theft</option>
                            <option value="assault">Assault</option>
                            <option value="accident">Traffic Accident</option>
                            <option value="disturbance">Public Disturbance</option>
                            <option value="other">Other Emergency</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Urgency Level</label>
                        <select id="urgency-level">
                            <option value="low">Low - Non-urgent</option>
                            <option value="medium">Medium - Requires attention</option>
                            <option value="high">High - Urgent</option>
                            <option value="critical">Critical - Immediate danger</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Brief Description</label>
                        <input type="text" id="incident-desc" placeholder="What happened?" maxlength="200">
                    </div>
                    <button class="btn btn-blue" id="request-btn">Request Officer</button>
                    <button class="btn btn-red" id="sos-btn" style="margin-top: 10px; font-size: 1.1rem; padding: 14px;">
                        SOS - EMERGENCY
                    </button>
                </div>
            </div>

            <div class="rpngc-sidebar-section" id="status-section" style="display: none;">
                <h3>Request Status</h3>
                <div id="status-info"></div>
            </div>

            <div class="rpngc-sidebar-section" id="messaging-section" style="display: none;">
                <h3>Chat with Officer</h3>
                <div id="message-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px; padding: 8px; background: #f7f9fc; border-radius: 5px;"></div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <input type="text" id="message-input" placeholder="Type a message..." maxlength="300">
                </div>
                <button class="btn btn-blue" id="send-message-btn">Send</button>
            </div>
        </aside>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, citizenMarker, officerMarker;
        let currentIncidentId = null;
        let citizenLocation = null;
        let citizenId = 'citizen-' + Date.now(); // Generate unique citizen ID

        // Join socket room
        socket.emit('join', { userId: citizenId, role: 'citizen' });

        // Initialize map centered on Port Moresby
        map = L.map('map').setView([-9.4438, 147.1803], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Get citizen's location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                citizenLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                map.setView([citizenLocation.lat, citizenLocation.lng], 15);
                
                citizenMarker = L.marker([citizenLocation.lat, citizenLocation.lng], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #C8102E; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    })
                }).addTo(map).bindPopup('Your Location');
            }, error => {
                console.error('Geolocation error:', error);
                showNotification('Unable to get your location. Using default.', 'warning');
            });
        }

        // Request assistance
        document.getElementById('request-btn').addEventListener('click', () => {
            requestAssistance(false);
        });

        // SOS button
        document.getElementById('sos-btn').addEventListener('click', () => {
            if (confirm('Send EMERGENCY SOS? This will alert all nearby officers immediately.')) {
                requestAssistance(true);
            }
        });

        function requestAssistance(isSOS) {
            const phone = document.getElementById('phone-input').value.trim();
            if (!phone) {
                alert('Please enter your phone number');
                return;
            }

            if (!citizenLocation) {
                alert('Waiting for your location...');
                return;
            }

            const data = {
                citizenId: citizenId,
                citizenPhone: phone,
                incidentType: document.getElementById('incident-type').value,
                urgency: document.getElementById('urgency-level').value,
                description: document.getElementById('incident-desc').value || 'No description provided',
                location: citizenLocation,
                isSOS: isSOS
            };

            socket.emit('request-assistance', data);
            document.getElementById('request-form').style.display = 'none';
            document.getElementById('status-section').style.display = 'block';
            document.getElementById('status-info').innerHTML = `
                <div class="notification ${isSOS ? 'danger' : 'info'}">
                    ${isSOS ? 'EMERGENCY SOS SENT!' : 'Request sent. Waiting for officer...'}
                </div>
            `;
        }

        // Officer accepted
        socket.on('incident-accepted', data => {
            currentIncidentId = data.incidentId;
            document.getElementById('status-info').innerHTML = `
                <div class="notification success">
                    Officer ${data.officerName} is responding!
                </div>
                <div class="profile-card" style="margin-top: 10px;">
                    <strong>Officer:</strong> ${data.officerName}<br>
                    <strong>Badge:</strong> ${data.officerBadge}<br>
                    <strong>ETA:</strong> Arriving soon
                </div>
            `;
            document.getElementById('messaging-section').style.display = 'block';

            // Add officer marker
            if (data.officerLocation) {
                if (officerMarker) map.removeLayer(officerMarker);
                officerMarker = L.marker([data.officerLocation.lat, data.officerLocation.lng], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #0057B8; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    })
                }).addTo(map).bindPopup(`Officer ${data.officerName}`);
            }
        });

        // Officer location update
        socket.on('officer-location-update', data => {
            if (officerMarker && data.location) {
                officerMarker.setLatLng([data.location.lat, data.location.lng]);
            }
        });

        // Incident closed
        socket.on('incident-closed', data => {
            document.getElementById('status-info').innerHTML = `
                <div class="notification success">
                    Incident resolved. Thank you for using RPNGC services.
                </div>
            `;
            document.getElementById('messaging-section').style.display = 'none';
            setTimeout(() => location.reload(), 3000);
        });

        // Messaging
        document.getElementById('send-message-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentIncidentId) return;

            socket.emit('send-message', {
                incidentId: currentIncidentId,
                sender: 'citizen',
                text: text
            });
            input.value = '';
        }

        socket.on('new-message', data => {
            const msgList = document.getElementById('message-list');
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = '8px';
            msgDiv.style.padding = '6px 10px';
            msgDiv.style.borderRadius = '4px';
            msgDiv.style.fontSize = '0.83rem';
            
            if (data.senderRole === 'citizen') {
                msgDiv.style.background = '#e8f0fe';
                msgDiv.style.textAlign = 'right';
                msgDiv.innerHTML = `<strong>You:</strong> ${data.text}`;
            } else {
                msgDiv.style.background = '#f0f0f0';
                msgDiv.innerHTML = `<strong>Officer:</strong> ${data.text}`;
            }
            
            msgList.appendChild(msgDiv);
            msgList.scrollTop = msgList.scrollHeight;
        });

        function showNotification(msg, type) {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        // Mobile menu toggle
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Close sidebar when clicking on map (mobile)
        document.getElementById('map').addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
