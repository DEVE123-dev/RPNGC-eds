<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Management - RPNGC</title>
    <link rel="stylesheet" href="/css/rpngc.css">
</head>
<body>
    <header class="rpngc-header">
        <img src="/images/logo.jpg" alt="RPNGC Logo">
        <div>
            <h1>Royal Papua New Guinea Constabulary</h1>
            <p>Officer Management Panel</p>
        </div>
        <a href="/hq.html">← Back to HQ</a>
    </header>

    <div style="padding: 24px; max-width: 1200px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--rpngc-blue-dark); font-size: 1.3rem;">Officer Directory</h2>
            <button class="btn btn-blue" id="add-officer-btn" style="width: auto; padding: 10px 20px;">+ Add Officer</button>
        </div>

        <div id="officer-table-container"></div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div style="background: #fff; border-radius: 10px; padding: 28px; width: 500px; max-height: 90vh; overflow-y: auto;">
            <h2 style="color: var(--rpngc-blue-dark); margin-bottom: 20px;" id="modal-title">Add Officer</h2>
            
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="input-userId" placeholder="officer-001">
            </div>
            <div class="form-group">
                <label>Badge Number</label>
                <input type="text" id="input-badgeNumber" placeholder="RPNGC-001">
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="input-displayName" placeholder="Officer John Doe">
            </div>
            <div class="form-group">
                <label>Rank</label>
                <select id="input-rank">
                    <option value="Constable">Constable</option>
                    <option value="Senior Constable">Senior Constable</option>
                    <option value="Sergeant">Sergeant</option>
                    <option value="Senior Sergeant">Senior Sergeant</option>
                    <option value="Inspector">Inspector</option>
                    <option value="Superintendent">Superintendent</option>
                </select>
            </div>
            <div class="form-group">
                <label>Station</label>
                <input type="text" id="input-station" placeholder="Boroko Police Station">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="input-phone" placeholder="+675 XXXX XXXX">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="input-email" placeholder="officer@rpngc.gov.pg">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="input-password" placeholder="Enter password">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-blue" id="save-officer-btn">Save</button>
                <button class="btn btn-gray" id="cancel-btn">Cancel</button>
            </div>
            <div id="modal-error" class="error-msg"></div>
        </div>
    </div>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th {
            background: var(--rpngc-blue-dark);
            color: #fff;
            padding: 12px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eef0f7;
            font-size: 0.85rem;
        }
        tr:hover {
            background: #f7f9fc;
        }
        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
        }
        .edit-btn {
            background: var(--rpngc-blue);
            color: #fff;
        }
        .delete-btn {
            background: var(--rpngc-red);
            color: #fff;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }
    </style>

    <script>
        let officers = [];
        let editingOfficerId = null;
        const token = localStorage.getItem('hq-token') || prompt('Enter HQ token:');

        loadOfficers();

        document.getElementById('add-officer-btn').addEventListener('click', () => {
            editingOfficerId = null;
            document.getElementById('modal-title').textContent = 'Add Officer';
            clearForm();
            document.getElementById('modal-overlay').style.display = 'flex';
        });

        document.getElementById('cancel-btn').addEventListener('click', () => {
            document.getElementById('modal-overlay').style.display = 'none';
        });

        document.getElementById('save-officer-btn').addEventListener('click', saveOfficer);

        async function loadOfficers() {
            try {
                const res = await fetch('/admin/officers', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                officers = data.officers;
                renderTable();
            } catch (err) {
                alert('Failed to load officers: ' + err.message);
            }
        }

        function renderTable() {
            const container = document.getElementById('officer-table-container');
            if (officers.length === 0) {
                container.innerHTML = '<div class="notification info">No officers found</div>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Badge</th>
                            <th>Name</th>
                            <th>Rank</th>
                            <th>Station</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${officers.map(o => `
                            <tr>
                                <td>${o.badgeNumber}</td>
                                <td>${o.displayName}</td>
                                <td>${o.rank}</td>
                                <td>${o.station}</td>
                                <td>${o.phone}</td>
                                <td><span class="status-badge ${o.active ? 'status-active' : 'status-inactive'}">${o.active ? 'Active' : 'Inactive'}</span></td>
                                <td>
                                    <button class="action-btn edit-btn" onclick="editOfficer('${o.userId}')">Edit</button>
                                    <button class="action-btn delete-btn" onclick="deleteOfficer('${o.userId}')">Deactivate</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function editOfficer(userId) {
            const officer = officers.find(o => o.userId === userId);
            if (!officer) return;

            editingOfficerId = userId;
            document.getElementById('modal-title').textContent = 'Edit Officer';
            document.getElementById('input-userId').value = officer.userId;
            document.getElementById('input-userId').disabled = true;
            document.getElementById('input-badgeNumber').value = officer.badgeNumber;
            document.getElementById('input-displayName').value = officer.displayName;
            document.getElementById('input-rank').value = officer.rank;
            document.getElementById('input-station').value = officer.station;
            document.getElementById('input-phone').value = officer.phone;
            document.getElementById('input-email').value = officer.email;
            document.getElementById('input-password').value = '';
            document.getElementById('input-password').placeholder = 'Leave blank to keep current';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        async function deleteOfficer(userId) {
            if (!confirm('Deactivate this officer? They will no longer be able to log in.')) return;

            try {
                await fetch(`/admin/officers/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadOfficers();
            } catch (err) {
                alert('Failed to deactivate officer: ' + err.message);
            }
        }

        async function saveOfficer() {
            const data = {
                userId: document.getElementById('input-userId').value.trim(),
                badgeNumber: document.getElementById('input-badgeNumber').value.trim(),
                displayName: document.getElementById('input-displayName').value.trim(),
                rank: document.getElementById('input-rank').value,
                station: document.getElementById('input-station').value.trim(),
                phone: document.getElementById('input-phone').value.trim(),
                email: document.getElementById('input-email').value.trim(),
                password: document.getElementById('input-password').value
            };

            if (!data.userId || !data.badgeNumber || !data.displayName) {
                document.getElementById('modal-error').textContent = 'Please fill required fields';
                return;
            }

            if (!editingOfficerId && !data.password) {
                document.getElementById('modal-error').textContent = 'Password required for new officer';
                return;
            }

            try {
                const url = editingOfficerId ? `/admin/officers/${editingOfficerId}` : '/admin/officers';
                const method = editingOfficerId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error('Failed to save');

                document.getElementById('modal-overlay').style.display = 'none';
                loadOfficers();
            } catch (err) {
                document.getElementById('modal-error').textContent = err.message;
            }
        }

        function clearForm() {
            document.getElementById('input-userId').value = '';
            document.getElementById('input-userId').disabled = false;
            document.getElementById('input-badgeNumber').value = '';
            document.getElementById('input-displayName').value = '';
            document.getElementById('input-rank').value = 'Constable';
            document.getElementById('input-station').value = '';
            document.getElementById('input-phone').value = '';
            document.getElementById('input-email').value = '';
            document.getElementById('input-password').value = '';
            document.getElementById('input-password').placeholder = 'Enter password';
            document.getElementById('modal-error').textContent = '';
        }

        window.editOfficer = editOfficer;
        window.deleteOfficer = deleteOfficer;
    </script>
</body>
</html>
